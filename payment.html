<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVICE COPS - Payment</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .payment-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        .payment-form {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        .form-section {
            margin-bottom: 25px;
        }

        .form-section h3 {
            color: #333;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            border-bottom: 2px solid #f57c00;
            padding-bottom: 10px;
        }

        .payment-methods {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .payment-method {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .payment-method:hover {
            border-color: #f57c00;
            background: #fff8f0;
        }

        .payment-method input[type="radio"] {
            margin-bottom: 10px;
        }

        .payment-method.selected {
            border-color: #f57c00;
            background: #fff8f0;
            box-shadow: 0 2px 8px rgba(245, 124, 0, 0.2);
        }

        .payment-method-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .payment-method-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .payment-method-desc {
            font-size: 12px;
            color: #666;
        }

        .mobile-money-providers {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 15px;
        }

        .provider-option {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .provider-option:hover {
            border-color: #f57c00;
            background: #fff8f0;
        }

        .provider-option.selected {
            border-color: #f57c00;
            background: #f57c00;
            color: white;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #f57c00;
            box-shadow: 0 0 0 3px rgba(245, 124, 0, 0.1);
        }

        .amount-input {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .amount-input input {
            flex: 1;
        }

        .amount-input span {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #f5f5f5;
            border-radius: 6px;
            font-weight: 600;
            color: #666;
        }

        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 8px;
            margin-top: 10px;
        }

        .quick-amount-btn {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .quick-amount-btn:hover {
            border-color: #f57c00;
            background: #fff8f0;
        }

        .btn-pay {
            width: 100%;
            padding: 12px;
            background: #f57c00;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }

        .btn-pay:hover {
            background: #e65100;
        }

        .btn-pay:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .payment-summary {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .summary-row:last-child {
            margin-bottom: 0;
            border-top: 1px solid #ddd;
            padding-top: 10px;
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .status-message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            display: none;
        }

        .status-message.success {
            display: block;
            background: #e8f5e9;
            color: #558b2f;
            border: 1px solid #c8e6c9;
        }

        .status-message.error {
            display: block;
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ef9a9a;
        }

        .status-message.info {
            display: block;
            background: #e3f2fd;
            color: #1565c0;
            border: 1px solid #bbdefb;
        }

        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        @media (max-width: 600px) {
            .payment-form {
                padding: 20px;
            }

            .payment-methods {
                grid-template-columns: 1fr;
            }

            .mobile-money-providers {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div style="position: fixed; top: 10px; left: 10px; display: flex; gap: 8px; z-index: 100;">
        <button class="nav-btn" onclick="navigateBack()" title="Go back">◀</button>
        <button class="nav-btn" onclick="navigateForward()" title="Go forward">▶</button>
        <button class="nav-btn" onclick="goHome()" title="Go home">🏠</button>
    </div>

    <div class="payment-container">
        <div class="payment-form">
            <h1 style="color: #333; margin-bottom: 20px;">💳 Make Payment</h1>

            <div id="statusMessage" class="status-message"></div>

            <form id="paymentForm">
                <!-- Amount Section -->
                <div class="form-section">
                    <h3>Payment Amount</h3>
                    
                    <div class="amount-input">
                        <input 
                            type="number" 
                            id="amount" 
                            name="amount" 
                            placeholder="Enter amount"
                            min="0"
                            step="100"
                            required
                        >
                        <span>USH</span>
                    </div>

                    <div class="quick-amounts">
                        <button type="button" class="quick-amount-btn" onclick="setAmount(5000)">5K</button>
                        <button type="button" class="quick-amount-btn" onclick="setAmount(10000)">10K</button>
                        <button type="button" class="quick-amount-btn" onclick="setAmount(50000)">50K</button>
                        <button type="button" class="quick-amount-btn" onclick="setAmount(100000)">100K</button>
                        <button type="button" class="quick-amount-btn" onclick="setAmount(500000)">500K</button>
                    </div>
                </div>

                <!-- Payment Method Section -->
                <div class="form-section">
                    <h3>Select Payment Method</h3>
                    
                    <div class="payment-methods">
                        <div class="payment-method" onclick="selectPaymentMethod('mobile_money', event)">
                            <input type="radio" name="paymentMethod" value="mobile_money" required>
                            <div class="payment-method-icon">📱</div>
                            <div class="payment-method-name">Mobile Money</div>
                            <div class="payment-method-desc">MTN, Airtel, etc.</div>
                        </div>

                        <div class="payment-method" onclick="selectPaymentMethod('cash', event)">
                            <input type="radio" name="paymentMethod" value="cash">
                            <div class="payment-method-icon">💵</div>
                            <div class="payment-method-name">Cash</div>
                            <div class="payment-method-desc">Pay in person</div>
                        </div>

                        <div class="payment-method" onclick="selectPaymentMethod('bank', event)">
                            <input type="radio" name="paymentMethod" value="bank">
                            <div class="payment-method-icon">🏦</div>
                            <div class="payment-method-name">Bank Transfer</div>
                            <div class="payment-method-desc">Direct transfer</div>
                        </div>
                    </div>
                </div>

                <!-- Mobile Money Provider Section -->
                <div id="mobileMoneySection" class="form-section" style="display: none;">
                    <h3>Select Mobile Money Provider</h3>
                    
                    <div id="providersContainer" class="mobile-money-providers">
                        <!-- Providers will be loaded here -->
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input 
                            type="tel" 
                            id="phone" 
                            name="phone" 
                            placeholder="+256700000000"
                        >
                        <div class="help-text">Enter your mobile money registered number</div>
                    </div>
                </div>

                <!-- Description Section -->
                <div class="form-section">
                    <h3>Payment Description</h3>
                    
                    <div class="form-group">
                        <label for="description">What is this payment for?</label>
                        <select id="description" name="description" required>
                            <option value="">Select package or service</option>
                            <option value="Hourly Package">Hourly Package</option>
                            <option value="Daily Package">Daily Package</option>
                            <option value="Weekly Package">Weekly Package</option>
                            <option value="Monthly Package">Monthly Package</option>
                            <option value="Account Balance">Add Account Balance</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <!-- Payment Summary -->
                <div class="payment-summary">
                    <div class="summary-row">
                        <span>Amount:</span>
                        <span id="summaryAmount">0 USH</span>
                    </div>
                    <div class="summary-row">
                        <span>Fee:</span>
                        <span id="summaryFee">0 USH</span>
                    </div>
                    <div class="summary-row">
                        <span>Total:</span>
                        <span id="summaryTotal">0 USH</span>
                    </div>
                </div>

                <button type="submit" class="btn-pay" id="submitBtn">Complete Payment</button>
            </form>
        </div>
    </div>

    <script src="payment.js"></script>
    <script src="nav-arrows.js"></script>
</body>
</html>
